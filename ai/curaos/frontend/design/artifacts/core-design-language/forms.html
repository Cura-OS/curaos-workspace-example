<!-- @dsCard group="Forms" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CuraOS · Forms</title>
<style>
  :root{
    --primary-400:#1fb0d4;--primary-500:#0e90b8;--primary-600:#0d7197;--primary-700:#105a7c;
    --error:#bb3328;--success:#188a4c;
    --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Inter','Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:#eceff0;color:#161b1c;padding:24px;line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto}
  .hdr{margin-bottom:24px}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--primary-600)}
  h1{font-size:32px;font-weight:600;letter-spacing:-0.015em;margin:6px 0 4px}
  .sub{font-size:15px;color:#525c5e;max-width:64ch}
  .panes{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:860px){.panes{grid-template-columns:1fr}}
  .pane{border-radius:16px;padding:24px;border:1px solid}
  .pane.light{background:#f6f8f8;color:#161b1c;border-color:#dde2e3;
    --bg:#f6f8f8;--fg:#161b1c;--muted:#525c5e;--sub:#6e797b;--line:#dde2e3;--line-st:#c4cccd;--surf:#fff;
    --pri:var(--primary-600);--pri-sub:#e8fbff;--err:var(--error);--err-bg:#fdeceb;--ok:var(--success)}
  .pane.dark{background:#0d1112;color:#eceff0;border-color:#2c3537;
    --bg:#0d1112;--fg:#eceff0;--muted:#9aa5a7;--sub:#6e797b;--line:#3c4547;--line-st:#525c5e;--surf:#1a201f;
    --pri:var(--primary-400);--pri-sub:#0a2030;--err:#e5746c;--err-bg:#3a1714;--ok:#52c47f}
  .pane-tag{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;opacity:.6;margin-bottom:18px;display:flex;align-items:center;gap:8px}
  .pane-tag::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--primary-500)}
  .field{margin-bottom:16px}
  .field > label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--fg)}
  .req{color:var(--err)}
  .hint{font-size:12px;color:var(--sub);margin-top:5px}
  .err-msg{font-size:12px;color:var(--err);margin-top:5px;display:flex;align-items:center;gap:5px}
  .err-msg svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;flex-shrink:0}
  input[type=text],input[type=email],textarea,select{width:100%;font-family:inherit;font-size:14px;
    color:var(--fg);background:var(--surf);border:1px solid var(--line);border-radius:8px;padding:9px 12px;
    transition:border-color .14s,box-shadow .14s}
  input::placeholder,textarea::placeholder{color:var(--sub)}
  input:hover,textarea:hover,select:hover{border-color:var(--line-st)}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-sub)}
  textarea{resize:vertical;min-height:72px}
  .field.is-error input,.field.is-error textarea{border-color:var(--err);box-shadow:0 0 0 3px var(--err-bg)}
  input[disabled]{opacity:.5;cursor:not-allowed;background:var(--bg)}
  /* select w/ caret */
  .selwrap{position:relative}
  .selwrap svg.caret{position:absolute;right:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--muted);stroke-width:2;fill:none;pointer-events:none}
  select{appearance:none;padding-right:34px}
  /* combobox */
  .combo{position:relative}
  .combo-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surf);border:1px solid var(--line);
    border-radius:8px;box-shadow:0 8px 24px rgba(13,17,18,.12);padding:4px;z-index:5;display:none}
  .combo.open .combo-list{display:block}
  .combo-opt{padding:8px 10px;border-radius:6px;font-size:14px;cursor:pointer;display:flex;justify-content:space-between}
  .combo-opt:hover,.combo-opt.hl{background:var(--pri-sub);color:var(--pri)}
  .combo-opt small{opacity:.5;font-size:11px}
  /* toggles */
  .ctl-row{display:flex;align-items:center;gap:10px;margin-bottom:11px;font-size:14px;cursor:pointer}
  .box,.dot{flex-shrink:0;border:1.5px solid var(--line-st);transition:.14s}
  .box{width:18px;height:18px;border-radius:5px;display:grid;place-items:center;background:var(--surf)}
  .ctl-row input{display:none}
  .ctl-row input:checked + .box{background:var(--pri);border-color:var(--pri)}
  .box svg{width:12px;height:12px;stroke:#fff;stroke-width:3;fill:none;opacity:0;transition:.14s}
  .pane.dark .box svg{stroke:#0d1112}
  .ctl-row input:checked + .box svg{opacity:1}
  .dot{width:18px;height:18px;border-radius:50%;background:var(--surf)}
  .ctl-row input:checked + .dot{border-color:var(--pri);box-shadow:inset 0 0 0 4px var(--pri)}
  .sw{width:38px;height:22px;border-radius:9999px;background:var(--line-st);position:relative;transition:.14s;flex-shrink:0}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.18s cubic-bezier(.2,0,0,1);box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .ctl-row input:checked + .sw{background:var(--pri)}
  .ctl-row input:checked + .sw::after{transform:translateX(16px)}
  /* tag-input */
  .tagfield{display:flex;flex-wrap:wrap;gap:6px;align-items:center;background:var(--surf);border:1px solid var(--line);border-radius:8px;padding:6px 8px}
  .tagfield:focus-within{border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-sub)}
  .tag{display:inline-flex;align-items:center;gap:5px;background:var(--pri-sub);color:var(--pri);font-size:12px;font-weight:600;padding:3px 8px;border-radius:6px}
  .tag b{cursor:pointer;font-weight:700;opacity:.6}.tag b:hover{opacity:1}
  .tagfield input{border:0;box-shadow:none!important;flex:1;min-width:80px;padding:3px;background:transparent}
  /* datepicker */
  .dp{background:var(--surf);border:1px solid var(--line);border-radius:10px;padding:12px;width:240px}
  .dp-head{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;margin-bottom:10px}
  .dp-head button{border:0;background:transparent;cursor:pointer;color:var(--muted);font-size:16px;padding:2px 6px;border-radius:5px}
  .dp-head button:hover{background:var(--bg)}
  .dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .dp-grid .dow{font-size:10px;text-align:center;color:var(--sub);font-weight:600;padding:3px 0}
  .dp-grid .day{font-size:12px;text-align:center;padding:5px 0;border-radius:6px;cursor:pointer}
  .dp-grid .day:hover{background:var(--bg)}
  .dp-grid .day.sel{background:var(--pri);color:#fff;font-weight:600}
  .pane.dark .dp-grid .day.sel{color:#0d1112}
  .dp-grid .day.mute{opacity:.3}
  .lbl{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0;color:var(--sub);opacity:1;margin:22px 0 12px;display:flex;align-items:center;gap:8px}
  .lbl::before{content:"";width:14px;height:1px;background:var(--line)}
  .lbl:first-of-type{margin-top:0}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:14px}

  /* responsive: desktop / tablet / mobile */
  @media(max-width:680px){
    body{padding:16px}
    .wrap{padding:0}
    h1{font-size:26px}
    .pane{padding:18px 16px}
    .twocol{grid-template-columns:1fr!important}
    .kpis{grid-template-columns:1fr 1fr!important}
    .charts,.cards{grid-template-columns:1fr!important}
    .dp{width:100%!important}
  }
  @media(max-width:400px){ .kpis{grid-template-columns:1fr!important} }
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="eyebrow">CuraOS · Aqua</div>
    <h1>Forms</h1>
    <p class="sub">Inputs, select, combobox, checkbox/radio/switch, tag-input, date-picker, and the form-field (label + hint + error) wrapper. Error state uses the semantic error token only - primary stays for focus.</p>
  </div>
  <div class="panes" id="panes">
    <div class="pane light"><div class="pane-tag">Light</div><div class="content"></div></div>
    <div class="pane dark"><div class="pane-tag">Dark</div><div class="content"></div></div>
  </div>
</div>

<script>
  var CARET='<svg class="caret" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>';
  var CHK='<svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 6"/></svg>';
  var WARN='<svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>';

  function tpl(n){ return ''+
    '<div class="lbl">Form fields</div>'+
    '<div class="field"><label>Tenant name <span class="req">*</span></label>'+
      '<input type="text" value="Northgate Health" placeholder="Acme Clinic"><div class="hint">Shown across all 22 app surfaces.</div></div>'+
    '<div class="field is-error"><label>Subdomain <span class="req">*</span></label>'+
      '<input type="text" value="north gate" aria-invalid="true"><div class="err-msg">'+WARN+'No spaces - use letters, digits, hyphens.</div></div>'+
    '<div class="twocol">'+
      '<div class="field"><label>Region</label><div class="selwrap"><select>'+
        '<option>EU-West-2 (London)</option><option>US-East-1</option><option>AP-South-1</option></select>'+CARET+'</div></div>'+
      '<div class="field"><label>Plan</label><div class="selwrap"><select>'+
        '<option>HealthStack</option><option>EducationStack</option><option>ERP</option><option>Core only</option></select>'+CARET+'</div></div>'+
    '</div>'+
    '<div class="field"><label>Notes</label><textarea placeholder="Internal context for ops…">Migrated from legacy slate+blue theme.</textarea></div>'+
    '<div class="field"><label>Disabled</label><input type="text" value="cur_8fa21" disabled></div>'+

    '<div class="lbl">Combobox · type to filter, ↑↓ to move, ↵ to pick</div>'+
    '<div class="field"><label>Assign owner</label><div class="combo" id="combo'+n+'">'+
      '<input type="text" placeholder="Search teammates…" autocomplete="off" oninput="filt(this)" onkeydown="comboKey(event,this)" onfocus="this.parentNode.classList.add(\'open\')">'+
      '<div class="combo-list">'+
        '<div class="combo-opt">Dr. Amara Okafor <small>Clinical lead</small></div>'+
        '<div class="combo-opt">Priya Raman <small>Ops</small></div>'+
        '<div class="combo-opt">Lukas Vogt <small>Platform</small></div>'+
        '<div class="combo-opt">Sofia Marino <small>Support</small></div>'+
      '</div></div></div>'+

    '<div class="lbl">Selection controls</div>'+
    '<label class="ctl-row"><input type="checkbox" checked><span class="box">'+CHK+'</span>Enable audit logging</label>'+
    '<label class="ctl-row"><input type="checkbox"><span class="box">'+CHK+'</span>Allow SSO bypass</label>'+
    '<label class="ctl-row"><input type="radio" name="env'+n+'" checked><span class="dot"></span>Production</label>'+
    '<label class="ctl-row"><input type="radio" name="env'+n+'"><span class="dot"></span>Sandbox</label>'+
    '<label class="ctl-row"><input type="checkbox" checked><span class="sw"></span>Dark mode default for tenant</label>'+

    '<div class="lbl">Tag input</div>'+
    '<div class="field"><label>Allowed domains</label><div class="tagfield" onclick="this.querySelector(\'input\').focus()">'+
      '<span class="tag">northgate.health <b onclick="this.closest(\'.tag\').remove();event.stopPropagation()">×</b></span>'+
      '<span class="tag">nhs.uk <b onclick="this.closest(\'.tag\').remove();event.stopPropagation()">×</b></span>'+
      '<input type="text" placeholder="Add domain…" onkeydown="addtag(event,this)"></div></div>'+

    '<div class="lbl">Date picker</div>'+
    '<div class="dp" id="dp'+n+'"></div>';
  }

  document.querySelectorAll('.content').forEach(function(c,i){c.innerHTML=tpl(i);});

  function filt(inp){
    var v=inp.value.toLowerCase(), list=inp.parentNode.querySelectorAll('.combo-opt');
    inp.parentNode.classList.add('open');
    list.forEach(function(o){o.style.display=o.textContent.toLowerCase().indexOf(v)>-1?'flex':'none';o.classList.remove('hl');});
    var first=inp.parentNode.querySelector('.combo-opt:not([style*="none"])');
    if(first)first.classList.add('hl');
  }
  function comboVis(combo){return Array.prototype.slice.call(combo.querySelectorAll('.combo-opt')).filter(function(o){return o.style.display!=='none'});}
  function comboKey(e,inp){
    if(e.key!=='ArrowDown'&&e.key!=='ArrowUp'&&e.key!=='Enter')return;
    e.preventDefault();
    var combo=inp.closest('.combo'), vis=comboVis(combo);
    if(!vis.length)return;
    var i=vis.findIndex(function(o){return o.classList.contains('hl')});
    if(e.key==='Enter'){if(i>-1){inp.value=vis[i].firstChild.textContent.trim();combo.classList.remove('open');}return;}
    vis.forEach(function(o){o.classList.remove('hl')});
    i=e.key==='ArrowDown'?Math.min(i+1,vis.length-1):Math.max(i-1,0);
    if(i<0)i=0;
    vis[i].classList.add('hl');
  }
  document.addEventListener('click',function(e){
    document.querySelectorAll('.combo.open').forEach(function(c){if(!c.contains(e.target))c.classList.remove('open');});
  });
  document.querySelectorAll('.combo-opt').forEach(function(o){
    o.addEventListener('click',function(){var inp=o.closest('.combo').querySelector('input');inp.value=o.firstChild.textContent.trim();o.closest('.combo').classList.remove('open');});
  });
  function addtag(e,inp){
    if(e.key!=='Enter'||!inp.value.trim())return;e.preventDefault();
    var t=document.createElement('span');t.className='tag';
    t.innerHTML=inp.value.trim()+' <b onclick="this.closest(\'.tag\').remove();event.stopPropagation()">×</b>';
    inp.parentNode.insertBefore(t,inp);inp.value='';
  }
  // tiny date grid - June 2026, 15th preselected
  function buildDP(el){
    var dows=['S','M','T','W','T','F','S'];
    var h='<div class="dp-head"><button>‹</button><span>June 2026</span><button>›</button></div><div class="dp-grid">';
    dows.forEach(function(d){h+='<div class="dow">'+d+'</div>';});
    // June 1 2026 = Monday → 1 leading blank
    for(var b=0;b<1;b++)h+='<div class="day mute">'+(30+b)+'</div>';
    for(var d=1;d<=30;d++)h+='<div class="day'+(d===15?' sel':'')+'" onclick="pick(this)">'+d+'</div>';
    h+='</div>';el.innerHTML=h;
  }
  function pick(el){el.closest('.dp-grid').querySelectorAll('.sel').forEach(function(s){s.classList.remove('sel')});el.classList.add('sel');}
  document.querySelectorAll('.dp').forEach(buildDP);
</script>
</body>
</html>
