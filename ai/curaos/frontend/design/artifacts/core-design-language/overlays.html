<!-- @dsCard group="Overlays" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CuraOS · Overlays</title>
<style>
  :root{
    --primary-400:#1fb0d4;--primary-500:#0e90b8;--primary-600:#0d7197;--primary-700:#105a7c;--primary-800:#114863;
    --error:#bb3328;--error-700:#7c211b;
    --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Inter','Segoe UI',Roboto,sans-serif;
    --mono:'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:#eceff0;color:#161b1c;padding:24px;line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto}
  .hdr{margin-bottom:24px}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--primary-600)}
  h1{font-size:32px;font-weight:600;letter-spacing:-0.015em;margin:6px 0 4px}
  .sub{font-size:15px;color:#525c5e;max-width:64ch}
  .panes{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:980px){.panes{grid-template-columns:1fr}}
  .pane{border-radius:16px;padding:22px;border:1px solid}
  .pane.light{background:#f6f8f8;color:#161b1c;border-color:#dde2e3;
    --bg:#f6f8f8;--fg:#161b1c;--muted:#525c5e;--sub:#6e797b;--line:#dde2e3;--surf:#fff;--hover:#f0f3f3;
    --pri:var(--primary-600);--pri-h:var(--primary-700);--pri-sub:#e8fbff;--pri-fg:#105a7c;--on:#fff;
    --err:var(--error);--err-h:var(--error-700);--scrim:rgba(13,17,18,.32)}
  .pane.dark{background:#0d1112;color:#eceff0;border-color:#2c3537;
    --bg:#0d1112;--fg:#eceff0;--muted:#9aa5a7;--sub:#6e797b;--line:#2c3537;--surf:#1a201f;--hover:#222827;
    --pri:var(--primary-400);--pri-h:var(--primary-300);--pri-sub:#0a2030;--pri-fg:#4fcbe8;--on:#0d1112;
    --err:#e5746c;--err-h:#f1a5a0;--scrim:rgba(0,0,0,.55)}
  .pane-tag{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;opacity:.6;margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .pane-tag::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--primary-500)}
  .lbl{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0;color:var(--sub);opacity:1;margin:22px 0 10px;display:flex;align-items:center;gap:8px}
  .lbl::before{content:"";width:14px;height:1px;background:var(--line)}
  .lbl:first-of-type{margin-top:0}
  .btn{font-family:inherit;font-weight:600;font-size:14px;border:1px solid transparent;border-radius:8px;cursor:pointer;padding:9px 16px;transition:.14s}
  .b-pri{background:var(--pri);color:var(--on)}.b-pri:hover{background:var(--pri-h)}
  .b-sec{background:var(--surf);color:var(--fg);border-color:var(--line)}.b-sec:hover{border-color:var(--pri)}
  .b-dan{background:var(--err);color:var(--on)}.b-dan:hover{background:var(--err-h)}
  .pane.dark .b-dan{color:#0d1112}
  /* scrim mock: relative, not fixed, so it lives inside the card */
  .scene{position:relative;background:var(--bg);border:1px solid var(--line);border-radius:12px;height:320px;overflow:hidden}
  .scrim{position:absolute;inset:0;background:var(--scrim);backdrop-filter:blur(1px)}
  .dot-bg{position:absolute;inset:0;opacity:.5;background-image:radial-gradient(var(--line) 1px,transparent 1px);background-size:18px 18px}
  /* modal */
  .modal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:340px;background:var(--surf);
    border:1px solid var(--line);border-radius:14px;box-shadow:0 24px 48px rgba(0,0,0,.25);overflow:hidden}
  .modal .m-bd{padding:20px}
  .modal h3{font-size:17px;font-weight:600;letter-spacing:-0.01em;margin-bottom:6px;display:flex;align-items:center;gap:9px}
  .modal .m-ic{width:32px;height:32px;border-radius:9px;background:var(--err-h);background:var(--scrim);display:grid;place-items:center;flex-shrink:0}
  .modal .danger-ic{background:#fdeceb;color:var(--err)}.pane.dark .modal .danger-ic{background:#3a1714}
  .modal .danger-ic svg{width:17px;height:17px;stroke:currentColor;stroke-width:1.9;fill:none}
  .modal p{font-size:13px;color:var(--muted)}
  .modal .conf{font-family:var(--mono);font-size:12px;background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:7px 10px;margin-top:12px;color:var(--fg)}
  .modal .m-ft{display:flex;gap:9px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--line);background:var(--bg)}
  .modal .m-ft .btn{padding:7px 14px;font-size:13px}
  .x{position:absolute;top:13px;right:14px;cursor:pointer;color:var(--sub);font-size:18px;line-height:1}
  .x:hover{color:var(--fg)}
  /* drawer */
  .drawer{position:absolute;top:0;right:0;bottom:0;width:280px;background:var(--surf);border-left:1px solid var(--line);
    box-shadow:-16px 0 40px rgba(0,0,0,.18);padding:18px;overflow:auto}
  .drawer h3{font-size:16px;font-weight:600;margin-bottom:3px}
  .drawer .d-su{font-size:12px;color:var(--sub);margin-bottom:16px}
  .d-field{margin-bottom:13px}
  .d-field label{display:block;font-size:12px;font-weight:600;margin-bottom:5px}
  .d-field input,.d-field select{width:100%;font-family:inherit;font-size:13px;background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:8px 10px;color:var(--fg)}
  .d-field input:focus,.d-field select:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-sub)}
  .d-ft{display:flex;gap:8px;margin-top:18px}
  .d-ft .btn{flex:1;padding:9px;font-size:13px;text-align:center}
  /* cards */
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .card{background:var(--surf);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .card.raised{box-shadow:0 2px 4px rgba(13,17,18,.06),0 4px 8px rgba(13,17,18,.06)}
  .pane.dark .card.raised{box-shadow:0 4px 12px rgba(0,0,0,.4)}
  .card .c-bd{padding:15px}
  .card h4{font-size:14px;font-weight:600;margin-bottom:3px;display:flex;align-items:center;gap:7px}
  .card .c-mk{width:26px;height:26px;border-radius:7px;background:var(--pri-sub);color:var(--pri);display:grid;place-items:center}
  .card .c-mk svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.8;fill:none}
  .card p{font-size:12px;color:var(--muted)}
  .card .c-ft{padding:10px 15px;border-top:1px solid var(--line);font-size:12px;color:var(--sub);display:flex;justify-content:space-between;align-items:center;background:var(--bg)}
  .card.interactive{cursor:pointer;transition:.14s}
  .card.interactive:hover{border-color:var(--pri);transform:translateY(-1px)}

  /* responsive: desktop / tablet / mobile */
  @media(max-width:680px){
    body{padding:16px}
    .wrap{padding:0}
    h1{font-size:26px}
    .pane{padding:18px 16px}
    .twocol{grid-template-columns:1fr!important}
    .kpis{grid-template-columns:1fr 1fr!important}
    .charts,.cards{grid-template-columns:1fr!important}
    .dp{width:100%!important}
  }
  @media(max-width:400px){ .kpis{grid-template-columns:1fr!important} }
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="eyebrow">CuraOS · Aqua</div>
    <h1>Overlays</h1>
    <p class="sub">Modal/dialog (destructive-confirm pattern), right drawer (edit form), and card surfaces (flat / raised / interactive). Scrims are scoped to the demo frame so you can see both layers. Brand appears only on the confirm CTA.</p>
  </div>
  <div class="panes" id="panes">
    <div class="pane light"><div class="pane-tag">Light</div><div class="content"></div></div>
    <div class="pane dark"><div class="pane-tag">Dark</div><div class="content"></div></div>
  </div>
</div>

<script>
  var TRASH='<svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>';
  var FLOW='<svg viewBox="0 0 24 24"><rect x="3" y="4" width="6" height="5" rx="1"/><rect x="15" y="15" width="6" height="5" rx="1"/><path d="M6 9v4a3 3 0 0 0 3 3h6"/></svg>';
  var SHIELD='<svg viewBox="0 0 24 24"><path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z"/></svg>';

  function tpl(){return ''+
    '<div class="lbl">Modal · destructive confirm</div>'+
    '<div class="scene"><div class="dot-bg"></div><div class="scrim"></div>'+
      '<div class="modal"><span class="x">×</span><div class="m-bd">'+
        '<h3><span class="m-ic danger-ic">'+TRASH+'</span>Delete tenant?</h3>'+
        '<p>This permanently removes <b>Bramble ERP Co</b> and all 318 seats across every stack. This cannot be undone.</p>'+
        '<div class="conf">Type cur_71d3e to confirm</div></div>'+
        '<div class="m-ft"><button class="btn b-sec">Cancel</button><button class="btn b-dan">Delete tenant</button></div>'+
      '</div></div>'+

    '<div class="lbl">Drawer · edit panel</div>'+
    '<div class="scene"><div class="dot-bg"></div><div class="scrim"></div>'+
      '<div class="drawer"><span class="x">×</span><h3>Edit tenant</h3><div class="d-su">Northgate Health · cur_8fa21</div>'+
        '<div class="d-field"><label>Display name</label><input type="text" value="Northgate Health"></div>'+
        '<div class="d-field"><label>Region</label><select><option>EU-West-2 (London)</option><option>US-East-1</option></select></div>'+
        '<div class="d-field"><label>Stack</label><select><option>HealthStack</option><option>ERP</option></select></div>'+
        '<div class="d-ft"><button class="btn b-sec">Cancel</button><button class="btn b-pri">Save changes</button></div>'+
      '</div></div>'+

    '<div class="lbl">Cards</div>'+
    '<div class="cards">'+
      '<div class="card"><div class="c-bd"><h4><span class="c-mk">'+FLOW+'</span>Onboarding flow</h4><p>4 steps · last edited 2h ago by Priya.</p></div>'+
        '<div class="c-ft"><span>Draft</span><span>v3</span></div></div>'+
      '<div class="card raised"><div class="c-bd"><h4><span class="c-mk">'+SHIELD+'</span>Audit policy</h4><p>SOC 2 controls mapped to tenant scopes.</p></div>'+
        '<div class="c-ft"><span>Active</span><span>EU-West-2</span></div></div>'+
      '<div class="card interactive" style="grid-column:1/-1"><div class="c-bd"><h4><span class="c-mk">'+FLOW+'</span>Interactive card · hover me</h4>'+
        '<p>Lifts on hover, primary border. Used for clickable list rows and selectable templates.</p></div></div>'+
    '</div>';
  }
  document.querySelectorAll('.content').forEach(function(c){c.innerHTML=tpl();});
  document.addEventListener('click',function(e){if(e.target.classList.contains('x'))e.target.closest('.scene')&&(e.target.style.opacity=.3);});
</script>
</body>
</html>
