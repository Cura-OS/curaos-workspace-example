<!-- @dsCard group="Navigation" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CuraOS · Navigation</title>
<style>
  :root{
    --primary-400:#1fb0d4;--primary-500:#0e90b8;--primary-600:#0d7197;--primary-700:#105a7c;
    --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Inter','Segoe UI',Roboto,sans-serif;
    --mono:'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:#eceff0;color:#161b1c;padding:24px;line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto}
  .hdr{margin-bottom:24px}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--primary-600)}
  h1{font-size:32px;font-weight:600;letter-spacing:-0.015em;margin:6px 0 4px}
  .sub{font-size:15px;color:#525c5e;max-width:64ch}
  .panes{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:980px){.panes{grid-template-columns:1fr}}
  .pane{border-radius:16px;padding:20px;border:1px solid}
  .pane.light{background:#f6f8f8;color:#161b1c;border-color:#dde2e3;
    --bg:#f6f8f8;--fg:#161b1c;--muted:#525c5e;--sub:#6e797b;--line:#dde2e3;--surf:#fff;--hover:#f0f3f3;
    --pri:var(--primary-600);--pri-sub:#e8fbff;--pri-fg:#105a7c;--side:#0c2f44;--side-fg:#c4f1fb}
  .pane.dark{background:#0d1112;color:#eceff0;border-color:#2c3537;
    --bg:#0d1112;--fg:#eceff0;--muted:#9aa5a7;--sub:#6e797b;--line:#2c3537;--surf:#161b1c;--hover:#1a201f;
    --pri:var(--primary-400);--pri-sub:#0a2030;--pri-fg:#4fcbe8;--side:#0a1413;--side-fg:#91e2f3}
  .pane-tag{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;opacity:.6;margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .pane-tag::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--primary-500)}
  .lbl{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0;color:var(--sub);opacity:1;margin:22px 0 10px;display:flex;align-items:center;gap:8px}
  .lbl::before{content:"";width:14px;height:1px;background:var(--line)}
  .lbl:first-of-type{margin-top:0}
  svg.ic{width:17px;height:17px;stroke:currentColor;stroke-width:1.7;fill:none;flex-shrink:0}
  /* sidebar */
  .side{background:var(--side);border-radius:12px;padding:10px;width:210px}
  .side-brand{display:flex;align-items:center;gap:9px;padding:8px 10px 14px;color:#fff}
  .side-brand .mk{width:24px;height:24px;border-radius:7px;background:var(--primary-400);display:grid;place-items:center;color:#0c2f44;font-weight:700;font-size:13px}
  .side-brand b{font-size:14px;letter-spacing:-0.01em}
  .nav-i{position:relative;display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;color:var(--side-fg);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:1px;opacity:.78;transition:background .12s,opacity .12s}
  .nav-i:hover{opacity:1;background:rgba(255,255,255,.06)}
  .nav-i.on{opacity:1;background:rgba(31,176,212,.16);color:#fff}
  .nav-i.on::before{content:"";position:absolute;left:-11px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--primary-400)}
  .nav-i .badge{margin-left:auto;font-size:10px;font-weight:600;background:var(--primary-400);color:#0c2f44;padding:1px 6px;border-radius:9999px}
  .nav-sec{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--side-fg);opacity:.45;padding:12px 10px 5px}
  /* topbar */
  .top{display:flex;align-items:center;gap:12px;background:var(--surf);border:1px solid var(--line);border-radius:10px;padding:8px 12px}
  .top .search{flex:1;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:13px;color:var(--sub);cursor:text}
  .top .search kbd{margin-left:auto;font-family:var(--mono);font-size:10px;background:var(--surf);border:1px solid var(--line);border-radius:4px;padding:1px 5px;color:var(--muted)}
  .icbtn{width:32px;height:32px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--muted);display:grid;place-items:center;cursor:pointer;position:relative}
  .icbtn:hover{background:var(--bg);color:var(--fg)}
  .icbtn .dotbadge{position:absolute;top:6px;right:7px;width:7px;height:7px;border-radius:50%;background:#bb3328;border:1.5px solid var(--surf)}
  .uav{width:30px;height:30px;border-radius:8px;background:var(--pri);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:600;cursor:pointer}
  .pane.dark .uav{color:#0d1112}
  /* breadcrumb */
  .crumb{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--sub);flex-wrap:wrap}
  .crumb a{color:var(--sub);text-decoration:none}.crumb a:hover{color:var(--pri-fg);text-decoration:underline}
  .crumb .sep{opacity:.45}.crumb .cur{color:var(--fg);font-weight:600}
  /* tabs */
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--line)}
  .tab{padding:9px 14px;font-size:13px;font-weight:500;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:6px}
  .tab:hover{color:var(--fg)}
  .tab.on{color:var(--pri-fg);border-bottom-color:var(--pri);font-weight:600}
  .tab .cnt{font-size:11px;background:var(--bg);border:1px solid var(--line);border-radius:9999px;padding:0 6px}
  .tab.on .cnt{background:var(--pri-sub);border-color:transparent;color:var(--pri-fg)}
  .tabpanel{font-size:13px;color:var(--muted);padding:14px 2px}
  /* dropdown */
  .menu{background:var(--surf);border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 24px rgba(13,17,18,.14);padding:5px;width:220px}
  .mi{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;font-size:13px;cursor:pointer;color:var(--fg)}
  .mi:hover{background:var(--hover)}
  .mi kbd{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--sub)}
  .mi.danger{color:#bb3328}.pane.dark .mi.danger{color:#e5746c}
  .mi.danger:hover{background:#fdeceb}.pane.dark .mi.danger:hover{background:#3a1714}
  .msep{height:1px;background:var(--line);margin:5px 0}
  /* command palette */
  .cmd{background:var(--surf);border:1px solid var(--line);border-radius:12px;box-shadow:0 16px 48px rgba(13,17,18,.20);overflow:hidden}
  .cmd-in{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line);font-size:15px;color:var(--fg)}
  .cmd-in input{border:0;outline:0;background:transparent;font-family:inherit;font-size:15px;color:var(--fg);flex:1}
  .cmd-in input::placeholder{color:var(--sub)}
  .cmd-sec{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--sub);padding:9px 16px 4px}
  .cmd-i{display:flex;align-items:center;gap:11px;padding:9px 16px;font-size:13px;cursor:pointer}
  .cmd-i.hl,.cmd-i:hover{background:var(--pri-sub);color:var(--pri-fg)}
  .cmd-i .where{margin-left:auto;font-size:11px;color:var(--sub)}
  .cmd-i.hl .where{color:var(--pri-fg);opacity:.7}
  .cmd-empty{padding:18px 16px;font-size:13px;color:var(--sub);text-align:center}

  /* responsive: desktop / tablet / mobile */
  @media(max-width:680px){
    body{padding:16px}
    .wrap{padding:0}
    h1{font-size:26px}
    .pane{padding:18px 16px}
    .twocol{grid-template-columns:1fr!important}
    .kpis{grid-template-columns:1fr 1fr!important}
    .charts,.cards{grid-template-columns:1fr!important}
    .dp{width:100%!important}
  }
  @media(max-width:400px){ .kpis{grid-template-columns:1fr!important} }
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="eyebrow">CuraOS · Aqua</div>
    <h1>Navigation</h1>
    <p class="sub">Wayfinding for all 22 apps. The deep-blue rail anchors the product; everything else stays neutral. Primary color appears once, on the active item, so a user always knows where they are without the chrome competing for attention.</p>
  </div>
  <div class="panes" id="panes">
    <div class="pane light"><div class="pane-tag">Light</div><div class="content"></div></div>
    <div class="pane dark"><div class="pane-tag">Dark</div><div class="content"></div></div>
  </div>
</div>

<script>
  var I={
    grid:'<svg class="ic" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',
    users:'<svg class="ic" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6M17 14c2 0 4 1.8 4 5"/></svg>',
    flow:'<svg class="ic" viewBox="0 0 24 24"><rect x="3" y="4" width="6" height="5" rx="1"/><rect x="15" y="15" width="6" height="5" rx="1"/><path d="M6 9v4a3 3 0 0 0 3 3h6"/></svg>',
    chart:'<svg class="ic" viewBox="0 0 24 24"><path d="M4 20V4M4 20h16M8 16l3-4 3 3 4-6"/></svg>',
    gear:'<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.3.9a7 7 0 0 0-1.7-1L16.5 2h-4l-.4 2.4a7 7 0 0 0-1.7 1l-2.3-.9-2 3.4 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.3-.9a7 7 0 0 0 1.7 1l.4 2.4h4l.4-2.4a7 7 0 0 0 1.7-1l2.3.9 2-3.4-2-1.5c.07-.3.1-.66.1-1z"/></svg>',
    bell:'<svg class="ic" viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M10.3 21a2 2 0 0 0 3.4 0"/></svg>',
    search:'<svg class="ic" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>',
    book:'<svg class="ic" viewBox="0 0 24 24"><path d="M4 4h11a2 2 0 0 1 2 2v14H6a2 2 0 0 1-2-2zM17 6h3v14h-3"/></svg>',
    plus:'<svg class="ic" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>',
    logout:'<svg class="ic" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>'
  };

  function tpl(){return ''+
    '<div class="lbl">Sidebar rail</div>'+
    '<div class="side">'+
      '<div class="side-brand"><span class="mk">C</span><b>CuraOS</b></div>'+
      '<div class="nav-i on" onclick="selnav(this)">'+I.grid+'Overview</div>'+
      '<div class="nav-i" onclick="selnav(this)">'+I.users+'Tenants<span class="badge">218</span></div>'+
      '<div class="nav-i" onclick="selnav(this)">'+I.flow+'Workflows</div>'+
      '<div class="nav-i" onclick="selnav(this)">'+I.chart+'Analytics</div>'+
      '<div class="nav-sec">System</div>'+
      '<div class="nav-i" onclick="selnav(this)">'+I.gear+'Settings</div>'+
    '</div>'+

    '<div class="lbl">Topbar</div>'+
    '<div class="top">'+
      '<div class="search">'+I.search+'Search tenants, workflows…<kbd>⌘K</kbd></div>'+
      '<button class="icbtn" aria-label="Docs">'+I.book+'</button>'+
      '<button class="icbtn" aria-label="Notifications">'+I.bell+'<span class="dotbadge"></span></button>'+
      '<div class="uav">AO</div>'+
    '</div>'+

    '<div class="lbl">Breadcrumb</div>'+
    '<div class="crumb"><a href="#">Tenants</a><span class="sep">/</span><a href="#">Northgate Health</a><span class="sep">/</span><span class="cur">Settings</span></div>'+

    '<div class="lbl">Tabs</div>'+
    '<div class="tabs">'+
      '<div class="tab on" onclick="seltab(this)">Overview</div>'+
      '<div class="tab" onclick="seltab(this)">Members<span class="cnt">12</span></div>'+
      '<div class="tab" onclick="seltab(this)">Billing</div>'+
      '<div class="tab" onclick="seltab(this)">Audit log</div>'+
    '</div><div class="tabpanel">Tenant configuration for the selected stack overlay.</div>'+

    '<div class="lbl">Dropdown menu</div>'+
    '<div class="menu">'+
      '<div class="mi">'+I.plus+'New tenant<kbd>⌘N</kbd></div>'+
      '<div class="mi">'+I.book+'Docs</div>'+
      '<div class="mi">'+I.gear+'Preferences<kbd>⌘,</kbd></div>'+
      '<div class="msep"></div>'+
      '<div class="mi danger">'+I.logout+'Sign out</div>'+
    '</div>'+

    '<div class="lbl">Command palette ⌘K · type to filter, ↑↓ to move</div>'+
    '<div class="cmd">'+
      '<div class="cmd-in">'+I.search+'<input placeholder="Type a command or search…" oninput="cmdFilter(this)" onkeydown="cmdKey(event,this)"></div>'+
      '<div class="cmd-list">'+
        '<div class="cmd-sec">Actions</div>'+
        '<div class="cmd-i hl" data-k="provision new tenant">'+I.plus+'Provision new tenant<span class="where">⌘N</span></div>'+
        '<div class="cmd-i" data-k="provision workflow canvas">'+I.flow+'Provision workflow canvas<span class="where">Workflows</span></div>'+
        '<div class="cmd-sec">Tenants</div>'+
        '<div class="cmd-i" data-k="northgate health">'+I.users+'Northgate Health<span class="where">Jump to</span></div>'+
        '<div class="cmd-i" data-k="orion schools">'+I.users+'Orion Schools<span class="where">Jump to</span></div>'+
      '</div>'+
      '<div class="cmd-empty" hidden>No matches</div>'+
    '</div>';
  }
  document.querySelectorAll('.content').forEach(function(c){c.innerHTML=tpl();});

  function seltab(t){t.parentNode.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on')});t.classList.add('on');}
  function selnav(n){n.parentNode.querySelectorAll('.nav-i').forEach(function(x){x.classList.remove('on')});n.classList.add('on');}

  function cmdRows(cmd){return Array.prototype.slice.call(cmd.querySelectorAll('.cmd-i'));}
  function cmdSetHl(cmd,row){cmdRows(cmd).forEach(function(r){r.classList.remove('hl')});if(row)row.classList.add('hl');}
  function cmdFilter(inp){
    var cmd=inp.closest('.cmd'), q=inp.value.trim().toLowerCase();
    var any=false;
    cmdRows(cmd).forEach(function(r){var m=r.dataset.k.indexOf(q)>-1;r.style.display=m?'flex':'none';if(m)any=true;});
    // hide a section header whose rows all vanished
    cmd.querySelectorAll('.cmd-sec').forEach(function(s){var n=s.nextElementSibling,vis=false;
      while(n&&n.classList.contains('cmd-i')){if(n.style.display!=='none')vis=true;n=n.nextElementSibling;}
      s.style.display=vis?'':'none';});
    cmd.querySelector('.cmd-empty').hidden=any;
    var first=cmdRows(cmd).filter(function(r){return r.style.display!=='none'})[0];
    cmdSetHl(cmd,first);
  }
  function cmdKey(e,inp){
    if(e.key!=='ArrowDown'&&e.key!=='ArrowUp'&&e.key!=='Enter')return;
    e.preventDefault();
    var cmd=inp.closest('.cmd');
    var vis=cmdRows(cmd).filter(function(r){return r.style.display!=='none'});
    if(!vis.length)return;
    var i=vis.findIndex(function(r){return r.classList.contains('hl')});
    if(e.key==='Enter'){if(i>-1)vis[i].animate([{transform:'translateX(0)'},{transform:'translateX(3px)'},{transform:'translateX(0)'}],{duration:160,easing:'cubic-bezier(.2,0,0,1)'});return;}
    i=e.key==='ArrowDown'?Math.min(i+1,vis.length-1):Math.max(i-1,0);
    cmdSetHl(cmd,vis[i]);
  }
  document.querySelectorAll('.cmd-i').forEach(function(r){r.addEventListener('click',function(){cmdSetHl(r.closest('.cmd'),r);});});
</script>
</body>
</html>
