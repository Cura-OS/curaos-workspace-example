<!-- @dsCard group="App Shell" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CuraOS · App Shell</title>
<style>
  :root{
    --primary-300:#4fcbe8;--primary-400:#1fb0d4;--primary-500:#0e90b8;--primary-600:#0d7197;--primary-700:#105a7c;--primary-900:#0c2f44;
    --success:#188a4c;--warning:#b3760a;--error:#bb3328;--info:#1276ad;
    --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Inter','Segoe UI',Roboto,sans-serif;
    --mono:'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:#eceff0;color:#161b1c;padding:24px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1320px;margin:0 auto}
  .hdr{margin-bottom:20px}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--primary-600)}
  h1{font-size:32px;font-weight:600;letter-spacing:-0.015em;margin:6px 0 4px}
  .sub{font-size:15px;color:#525c5e;max-width:70ch}
  .switch{display:inline-flex;gap:2px;background:#dde2e3;border-radius:9px;padding:3px;margin-top:14px}
  .switch button{font-family:inherit;font-size:13px;font-weight:600;border:0;background:transparent;color:#525c5e;padding:6px 14px;border-radius:7px;cursor:pointer}
  .switch button.on{background:#fff;color:#0d7197;box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .theme-tog{float:right;font-family:inherit;font-size:12px;font-weight:600;border:1px solid #c4cccd;background:#fff;color:#3c4547;border-radius:8px;padding:7px 13px;cursor:pointer}

  /* ===== APP SHELL ===== */
  .app{--bg:#f6f8f8;--fg:#161b1c;--muted:#525c5e;--sub:#6e797b;--line:#dde2e3;--surf:#fff;--hover:#f0f3f3;--sel:#e8fbff;--grid:#eceff0;
    --pri:var(--primary-600);--pri-sub:#e8fbff;--pri-fg:#105a7c;--side:#0c2f44;--side-fg:#c4f1fb;--canvas:#eef1f1;
    --suc:var(--success);--suc-bg:#e7f8ec;--warn:var(--warning);--warn-bg:#fdf4e3;--err:var(--error);--err-bg:#fdeceb;--inf:var(--info);--inf-bg:#e8f4fb;
    background:var(--bg);color:var(--fg);border:1px solid var(--line);border-radius:16px;overflow:hidden;
    display:grid;grid-template-columns:auto 1fr;height:660px;box-shadow:0 6px 24px rgba(13,17,18,.07)}
  .app.dark{--bg:#0d1112;--fg:#eceff0;--muted:#9aa5a7;--sub:#6e797b;--line:#2c3537;--surf:#161b1c;--hover:#1a201f;--sel:#0a2030;--grid:#222827;
    --pri:var(--primary-400);--pri-sub:#0a2030;--pri-fg:#4fcbe8;--side:#081210;--side-fg:#91e2f3;--canvas:#0a0e0e;
    --suc:#52c47f;--suc-bg:#0f2e1d;--warn:#ecae35;--warn-bg:#352608;--err:#e5746c;--err-bg:#3a1714;--inf:#52ade0;--inf-bg:#0c2e44;
    border-color:#2c3537;box-shadow:0 6px 24px rgba(0,0,0,.4)}
  svg.ic{width:17px;height:17px;stroke:currentColor;stroke-width:1.7;fill:none;flex-shrink:0}

  /* sidebar */
  .rail{background:var(--side);width:218px;padding:12px 11px;display:flex;flex-direction:column;transition:width .2s cubic-bezier(.2,0,0,1)}
  .app.collapsed .rail{width:62px}
  .brand{display:flex;align-items:center;gap:9px;padding:6px 8px 16px;color:#fff;white-space:nowrap}
  .brand .mk{width:26px;height:26px;border-radius:7px;background:var(--primary-400);display:grid;place-items:center;color:#0c2f44;font-weight:700;font-size:14px;flex-shrink:0}
  .brand b{font-size:15px;letter-spacing:-0.01em}
  .app.collapsed .brand b,.app.collapsed .nav-i span,.app.collapsed .nav-sec,.app.collapsed .badge,.app.collapsed .ten-foot .tf-txt{display:none}
  .nav-i{display:flex;align-items:center;gap:11px;padding:8px 9px;border-radius:8px;color:var(--side-fg);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:1px;opacity:.78;transition:.12s;white-space:nowrap}
  .nav-i:hover{opacity:1;background:rgba(255,255,255,.06)}
  .nav-i.on{opacity:1;background:rgba(31,176,212,.18);color:#fff}
  .nav-i .badge{margin-left:auto;font-size:10px;font-weight:600;background:var(--primary-400);color:#0c2f44;padding:1px 6px;border-radius:9999px}
  .nav-sec{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--side-fg);opacity:.42;padding:13px 9px 5px;white-space:nowrap}
  .ten-foot{margin-top:auto;display:flex;align-items:center;gap:9px;padding:9px;border-radius:9px;background:rgba(255,255,255,.05);color:#fff;cursor:pointer}
  .ten-foot .av{width:28px;height:28px;border-radius:7px;background:var(--primary-400);color:#0c2f44;display:grid;place-items:center;font-size:11px;font-weight:700;flex-shrink:0}
  .ten-foot .tf-txt{font-size:12px;line-height:1.3;white-space:nowrap}.ten-foot .tf-txt span{display:block;opacity:.55;font-size:11px}

  /* main */
  .main{display:flex;flex-direction:column;min-width:0}
  .topbar{display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid var(--line);background:var(--surf)}
  .hb{width:32px;height:32px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--muted);display:grid;place-items:center;cursor:pointer}
  .hb:hover{background:var(--bg);color:var(--fg)}
  .crumb{font-size:13px;color:var(--sub);display:flex;align-items:center;gap:6px;min-width:0}
  .crumb .cur{color:var(--fg);font-weight:600}
  .crumb .sep{opacity:.4}
  .tsearch{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:13px;color:var(--sub);width:230px;cursor:text}
  .tsearch kbd{margin-left:auto;font-family:var(--mono);font-size:10px;background:var(--surf);border:1px solid var(--line);border-radius:4px;padding:1px 5px}
  .tic{width:32px;height:32px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--muted);display:grid;place-items:center;cursor:pointer;position:relative}
  .tic:hover{background:var(--bg);color:var(--fg)}
  .tic .nd{position:absolute;top:6px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--err);border:1.5px solid var(--surf)}
  .uav{width:30px;height:30px;border-radius:8px;background:var(--pri);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:600;cursor:pointer}
  .app.dark .uav{color:#0d1112}
  .content{flex:1;overflow:auto;padding:20px}

  /* ---- admin view ---- */
  .page-h{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
  .page-h h2{font-size:22px;font-weight:600;letter-spacing:-0.01em}
  .page-h p{font-size:13px;color:var(--muted);margin-top:2px}
  .btn{font-family:inherit;font-weight:600;font-size:13px;border:0;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;padding:9px 15px}
  .btn.pri{background:var(--pri);color:#fff}.app.dark .btn.pri{color:#0d1112}
  .btn.pri:hover{background:var(--primary-700)}.app.dark .btn.pri:hover{background:var(--primary-300)}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
  @media(max-width:760px){.kpis{grid-template-columns:1fr 1fr}}
  .kpi{background:var(--surf);border:1px solid var(--line);border-radius:11px;padding:14px 16px}
  .kpi .kl{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--sub)}
  .kpi .kv{font-size:25px;font-weight:600;letter-spacing:-0.02em;margin:5px 0 2px;font-variant-numeric:tabular-nums}
  .kpi .kd{font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
  .kpi .kd svg{width:12px;height:12px;stroke:currentColor;stroke-width:2.5;fill:none}
  .up{color:var(--suc)}.down{color:var(--err)}.flat{color:var(--sub)}
  .panel{background:var(--surf);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .panel-h{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line)}
  .panel-h h3{font-size:14px;font-weight:600}
  .panel-h .filters{display:flex;gap:6px}
  .fchip{font-size:12px;font-weight:600;padding:4px 10px;border-radius:7px;border:1px solid var(--line);color:var(--muted);cursor:pointer;background:var(--surf)}
  .fchip.on{background:var(--pri-sub);color:var(--pri-fg);border-color:transparent}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--sub);padding:9px 16px;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap}
  thead th:hover{color:var(--fg)}
  tbody td{padding:10px 16px;border-bottom:1px solid var(--grid);font-variant-numeric:tabular-nums}
  tbody tr:last-child td{border-bottom:0}
  tbody tr{cursor:pointer;transition:background .1s}
  tbody tr:hover{background:var(--hover)}
  .ten{display:flex;align-items:center;gap:9px}
  .ten .av{width:28px;height:28px;border-radius:7px;background:var(--pri);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:600;flex-shrink:0}
  .app.dark .ten .av{color:#0d1112}
  .num{text-align:right;font-family:var(--mono);font-size:12px}
  .st{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:9999px}
  .st::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  .st-ok{color:var(--suc);background:var(--suc-bg)}.st-warn{color:var(--warn);background:var(--warn-bg)}
  .st-err{color:var(--err);background:var(--err-bg)}.st-inf{color:var(--inf);background:var(--inf-bg)}

  /* ---- builder view ---- */
  .builder{display:grid;grid-template-columns:190px 1fr 220px;height:100%;min-height:0}
  @media(max-width:860px){.builder{grid-template-columns:1fr}.builder .b-lib,.builder .b-insp{display:none}}
  .b-lib{border-right:1px solid var(--line);padding:14px;overflow:auto;background:var(--surf)}
  .b-lib h4,.b-insp h4{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--sub);margin-bottom:10px}
  .lib-i{display:flex;align-items:center;gap:9px;padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-size:12px;font-weight:500;margin-bottom:7px;cursor:grab;background:var(--bg)}
  .lib-i:hover{border-color:var(--pri)}
  .lib-i .li-mk{width:22px;height:22px;border-radius:6px;background:var(--pri-sub);color:var(--pri);display:grid;place-items:center}
  .lib-i .li-mk svg{width:13px;height:13px;stroke:currentColor;stroke-width:1.8;fill:none}
  .b-canvas{background:var(--canvas);position:relative;overflow:hidden;background-image:radial-gradient(var(--line) 1px,transparent 1px);background-size:20px 20px}
  .node{position:absolute;background:var(--surf);border:1px solid var(--line);border-radius:10px;width:148px;box-shadow:0 3px 10px rgba(13,17,18,.08);font-size:12px}
  .app.dark .node{box-shadow:0 4px 14px rgba(0,0,0,.4)}
  .node.sel{border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-sub),0 3px 10px rgba(13,17,18,.1)}
  .node .n-h{display:flex;align-items:center;gap:7px;padding:8px 10px;border-bottom:1px solid var(--line);font-weight:600}
  .node .n-h .nmk{width:18px;height:18px;border-radius:5px;background:var(--pri-sub);color:var(--pri);display:grid;place-items:center}
  .node .n-h .nmk svg{width:11px;height:11px;stroke:currentColor;stroke-width:2;fill:none}
  .node .n-b{padding:8px 10px;color:var(--muted);font-size:11px}
  .port{position:absolute;width:10px;height:10px;border-radius:50%;background:var(--surf);border:2px solid var(--pri);top:50%;transform:translateY(-50%)}
  .port.out{right:-6px}.port.in{left:-6px}
  .wire{position:absolute;inset:0;pointer-events:none;z-index:0}
  .node{z-index:1}
  .b-insp{border-left:1px solid var(--line);padding:14px;overflow:auto;background:var(--surf)}
  .ins-f{margin-bottom:12px}
  .ins-f label{display:block;font-size:11px;font-weight:600;margin-bottom:5px;color:var(--muted)}
  .ins-f input,.ins-f select{width:100%;font-family:inherit;font-size:12px;background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:7px 9px;color:var(--fg)}
  .ins-f input:focus,.ins-f select:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-sub)}
  .canvas-tb{position:absolute;top:12px;left:12px;display:flex;gap:4px;background:var(--surf);border:1px solid var(--line);border-radius:9px;padding:4px;box-shadow:0 2px 8px rgba(13,17,18,.08);z-index:2}
  .canvas-tb button{width:30px;height:30px;border:0;background:transparent;color:var(--muted);border-radius:6px;cursor:pointer;display:grid;place-items:center}
  .canvas-tb button:hover,.canvas-tb button.on{background:var(--pri-sub);color:var(--pri)}
  .canvas-tb button svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.8;fill:none}
  .view-admin .builder,.view-builder .admin{display:none}

  /* responsive: auto-collapse rail, fluid chrome */
  @media(max-width:720px){
    body{padding:14px}
    .app{height:560px}
    .rail{width:62px!important}
    .rail .brand b,.rail .nav-i span,.rail .nav-sec,.rail .badge,.rail .ten-foot .tf-txt{display:none}
    .tsearch{width:auto;flex:0 0 auto}.tsearch span,.tsearch kbd{display:none}
    .kpis{grid-template-columns:1fr 1fr!important}
  }
  @media(max-width:420px){ .kpis{grid-template-columns:1fr!important} h1{font-size:24px} }
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <button class="theme-tog" id="ttog" onclick="toggleTheme()">◐ Dark</button>
    <div class="eyebrow">CuraOS · Aqua</div>
    <h1>App Shell</h1>
    <p class="sub">The system proven in context. Collapsible deep-blue rail + topbar drive two real screens: an admin console (tenant KPIs + sortable table) and the builder-studio canvas (component library, node graph, inspector). Click the hamburger to collapse the rail.</p>
    <div class="switch">
      <button class="on" id="sw-admin" onclick="setView('admin')">Admin console</button>
      <button id="sw-builder" onclick="setView('builder')">Builder canvas</button>
    </div>
  </div>

  <div class="app view-admin" id="app">
    <!-- rail -->
    <aside class="rail" id="rail"></aside>
    <!-- main -->
    <div class="main">
      <div class="topbar" id="topbar"></div>
      <div class="content" id="content"></div>
    </div>
  </div>
</div>

<script>
  var I={
    grid:'<svg class="ic" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',
    users:'<svg class="ic" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6M17 14c2 0 4 1.8 4 5"/></svg>',
    flow:'<svg class="ic" viewBox="0 0 24 24"><rect x="3" y="4" width="6" height="5" rx="1"/><rect x="15" y="15" width="6" height="5" rx="1"/><path d="M6 9v4a3 3 0 0 0 3 3h6"/></svg>',
    chart:'<svg class="ic" viewBox="0 0 24 24"><path d="M4 20V4M4 20h16M8 16l3-4 3 3 4-6"/></svg>',
    build:'<svg class="ic" viewBox="0 0 24 24"><path d="M14 7l3 3M5 19l9-9 1-4 4-1 1 4-9 9zM5 19l-2 2"/></svg>',
    gear:'<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>',
    bell:'<svg class="ic" viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M10.3 21a2 2 0 0 0 3.4 0"/></svg>',
    search:'<svg class="ic" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>',
    plus:'<svg class="ic" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>',
    book:'<svg class="ic" viewBox="0 0 24 24"><path d="M4 4h11a2 2 0 0 1 2 2v14H6a2 2 0 0 1-2-2zM17 6h3v14h-3"/></svg>',
    menu:'<svg class="ic" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>',
    up:'<svg viewBox="0 0 24 24"><path d="M7 14l5-5 5 5"/></svg>',
    down:'<svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5"/></svg>',
    input:'<svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="8" rx="2"/><path d="M7 12h.01"/></svg>',
    btn:'<svg viewBox="0 0 24 24"><rect x="3" y="9" width="18" height="6" rx="3"/></svg>',
    cond:'<svg viewBox="0 0 24 24"><path d="M12 3v6M12 15v6M6 12H3M21 12h-3"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>',
    pan:'<svg viewBox="0 0 24 24"><path d="M5 9l-2 3 2 3M9 5l3-2 3 2M15 19l-3 2-3-2M19 9l2 3-2 3"/></svg>',
    zoom:'<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3M11 8v6M8 11h6"/></svg>',
    add:'<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>'
  };

  function rail(){return ''+
    '<div class="brand"><span class="mk">C</span><b>CuraOS</b></div>'+
    '<div class="nav-i" data-v="admin">'+I.grid+'<span>Overview</span></div>'+
    '<div class="nav-i on" data-v="admin">'+I.users+'<span>Tenants</span><span class="badge">218</span></div>'+
    '<div class="nav-i" data-v="builder">'+I.build+'<span>Builder</span></div>'+
    '<div class="nav-i" data-v="builder">'+I.flow+'<span>Workflows</span></div>'+
    '<div class="nav-i">'+I.chart+'<span>Analytics</span></div>'+
    '<div class="nav-sec">System</div>'+
    '<div class="nav-i">'+I.gear+'<span>Settings</span></div>'+
    '<div class="ten-foot"><span class="av">AO</span><div class="tf-txt">Dr. Amara Okafor<span>Platform admin</span></div></div>';
  }
  function topbar(crumb){return ''+
    '<button class="hb" onclick="toggleRail()" aria-label="Toggle sidebar">'+I.menu+'</button>'+
    '<div class="crumb">'+crumb+'</div>'+
    '<div class="tsearch">'+I.search+'Search…<kbd>⌘K</kbd></div>'+
    '<button class="tic" aria-label="Docs">'+I.book+'</button>'+
    '<button class="tic" aria-label="Alerts">'+I.bell+'<span class="nd"></span></button>'+
    '<div class="uav">AO</div>';
  }

  var ROWS=[
    {n:'Northgate Health',stack:'HealthStack',seats:1284,up:'99.98%',st:['st-ok','Healthy']},
    {n:'Orion Schools',stack:'EducationStack',seats:1530,up:'99.9%',st:['st-ok','Healthy']},
    {n:'Westform District',stack:'EducationStack',seats:642,up:'99.4%',st:['st-warn','Degraded']},
    {n:'Bramble ERP Co',stack:'ERP',seats:318,up:'97.1%',st:['st-err','Incident']},
    {n:'Lyle Family Clinic',stack:'HealthStack',seats:88,up:'100%',st:['st-inf','Provisioning']}
  ];
  function initials(s){return s.split(' ').slice(0,2).map(function(w){return w[0]}).join('');}

  function adminView(){
    var rowsH='';
    ROWS.forEach(function(r){
      rowsH+='<tr><td><div class="ten"><span class="av">'+initials(r.n)+'</span>'+r.n+'</div></td>'+
        '<td>'+r.stack+'</td><td class="num">'+r.seats.toLocaleString()+'</td><td class="num">'+r.up+'</td>'+
        '<td><span class="st '+r.st[0]+'">'+r.st[1]+'</span></td></tr>';
    });
    return '<div class="admin">'+
      '<div class="page-h"><div><h2>Tenants</h2><p>218 active across HealthStack, EducationStack and ERP.</p></div>'+
        '<button class="btn pri">'+I.plus+'Provision tenant</button></div>'+
      '<div class="kpis">'+
        '<div class="kpi"><div class="kl">Active tenants</div><div class="kv">218</div><div class="kd up">'+I.up+'12 / wk</div></div>'+
        '<div class="kpi"><div class="kl">Avg uptime</div><div class="kv">99.7%</div><div class="kd up">'+I.up+'0.3 pts</div></div>'+
        '<div class="kpi"><div class="kl">Open incidents</div><div class="kv">3</div><div class="kd down">'+I.down+'2 / wk</div></div>'+
        '<div class="kpi"><div class="kl">Seats in use</div><div class="kv">14,302</div><div class="kd flat">- steady</div></div>'+
      '</div>'+
      '<div class="panel"><div class="panel-h"><h3>All tenants</h3>'+
        '<div class="filters"><span class="fchip on">All</span><span class="fchip">Health</span><span class="fchip">Education</span><span class="fchip">ERP</span></div></div>'+
        '<table><thead><tr><th>Tenant</th><th>Stack</th><th style="text-align:right">Seats</th><th style="text-align:right">Uptime</th><th>Status</th></tr></thead>'+
        '<tbody>'+rowsH+'</tbody></table></div>'+
    '</div>';
  }

  function builderView(){
    return '<div class="builder" style="margin:-20px">'+
      '<div class="b-lib"><h4>Components</h4>'+
        '<div class="lib-i"><span class="li-mk">'+I.input+'</span>Input</div>'+
        '<div class="lib-i"><span class="li-mk">'+I.btn+'</span>Button</div>'+
        '<div class="lib-i"><span class="li-mk">'+I.cond+'</span>Condition</div>'+
        '<div class="lib-i"><span class="li-mk">'+I.users+'</span>Lookup user</div>'+
        '<div class="lib-i"><span class="li-mk">'+I.bell+'</span>Notify</div>'+
      '</div>'+
      '<div class="b-canvas">'+
        '<div class="canvas-tb"><button class="on" title="Select">'+I.pan+'</button><button title="Add node">'+I.add+'</button><button title="Zoom">'+I.zoom+'</button></div>'+
        '<svg class="wire"><path d="M173 132 C 220 132, 220 210, 268 210" fill="none" stroke="var(--pri)" stroke-width="2"/>'+
          '<path d="M173 132 C 230 132, 230 320, 268 320" fill="none" stroke="var(--line)" stroke-width="2" stroke-dasharray="4 4"/></svg>'+
        '<div class="node" style="left:25px;top:106px"><div class="n-h"><span class="nmk">'+I.input+'</span>Intake form</div><div class="n-b">Patient details</div><span class="port out"></span></div>'+
        '<div class="node sel" style="left:268px;top:184px"><div class="n-h"><span class="nmk">'+I.cond+'</span>Triage rule</div><div class="n-b">Urgency ≥ 3 ?</div><span class="port in"></span><span class="port out"></span></div>'+
        '<div class="node" style="left:268px;top:294px"><div class="n-h"><span class="nmk">'+I.bell+'</span>Notify on-call</div><div class="n-b">SMS + push</div><span class="port in"></span></div>'+
      '</div>'+
      '<div class="b-insp"><h4>Inspector · Triage rule</h4>'+
        '<div class="ins-f"><label>Node label</label><input value="Triage rule"></div>'+
        '<div class="ins-f"><label>Field</label><select><option>urgency</option><option>wait_time</option></select></div>'+
        '<div class="ins-f"><label>Operator</label><select><option>≥ greater or equal</option><option>= equals</option></select></div>'+
        '<div class="ins-f"><label>Value</label><input value="3"></div>'+
      '</div>'+
    '</div>';
  }

  var collapsed=false, dark=false, view='admin';
  function render(){
    document.getElementById('rail').innerHTML=rail();
    var crumb = view==='admin'
      ? '<span>Platform</span><span class="sep">/</span><span class="cur">Tenants</span>'
      : '<span>Builder</span><span class="sep">/</span><span>Intake workflow</span><span class="sep">/</span><span class="cur">Canvas</span>';
    document.getElementById('topbar').innerHTML=topbar(crumb);
    document.getElementById('content').innerHTML = view==='admin'?adminView():builderView();
    document.getElementById('content').style.padding = view==='builder'?'0':'20px';
  }
  function setView(v){
    view=v;
    var app=document.getElementById('app');
    app.classList.toggle('view-admin',v==='admin');
    app.classList.toggle('view-builder',v==='builder');
    document.getElementById('sw-admin').classList.toggle('on',v==='admin');
    document.getElementById('sw-builder').classList.toggle('on',v==='builder');
    render();
  }
  function toggleRail(){collapsed=!collapsed;document.getElementById('app').classList.toggle('collapsed',collapsed);}
  function toggleTheme(){
    dark=!dark;
    document.getElementById('app').classList.toggle('dark',dark);
    document.getElementById('ttog').textContent = dark?'◑ Light':'◐ Dark';
  }
  render();
</script>
</body>
</html>
